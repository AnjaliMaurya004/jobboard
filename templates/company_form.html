{% extends "base.html" %}
{% block title %}Add Company{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h3 class="fw-bold mb-4">Add Company Profile</h3>
          <form method="post" action="/company/create">
            <div class="mb-3">
              <label class="form-label fw-semibold">Company Name *</label>
              <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea name="description" class="form-control" rows="4" placeholder="Tell job seekers about your company..."></textarea>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Website</label>
              <input type="text" name="website" class="form-control" placeholder="https://yourcompany.com">
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">Create Company</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
