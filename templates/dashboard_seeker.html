{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="mb-4">
    <h3 class="fw-bold mb-0">Welcome, {{ user.username }}!</h3>
    <p class="text-muted">Job Seeker Dashboard — Find your next role</p>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm text-center p-3">
        <h2 class="text-primary fw-bold">{{ jobs|length }}</h2>
        <p class="text-muted mb-0">Available Jobs</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm text-center p-3">
        <a href="/my-applications" class="text-decoration-none">
          <h2 class="text-success fw-bold"><i class="bi bi-file-earmark-check"></i></h2>
          <p class="text-muted mb-0">My Applications</p>
        </a>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm text-center p-3">
        <a href="/companies" class="text-decoration-none">
          <h2 class="text-secondary fw-bold"><i class="bi bi-building"></i></h2>
          <p class="text-muted mb-0">Browse Companies</p>
        </a>
      </div>
    </div>
  </div>

  <a href="/jobs" class="btn btn-primary btn-lg px-4"><i class="bi bi-search me-2"></i>Browse All Jobs</a>
</div>
{% endblock %}
