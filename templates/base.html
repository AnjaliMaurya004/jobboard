<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JobBoard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; font-size: 1.4rem; }
    .job-card { transition: transform 0.15s, box-shadow 0.15s; border: none; }
    .job-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .badge-tag { background: #e8f4fd; color: #0d6efd; border-radius: 20px; padding: 3px 10px; font-size: 0.78rem; }
    .hero { background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%); }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-briefcase-fill me-2"></i>JobBoard</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/jobs"><i class="bi bi-search me-1"></i>Browse Jobs</a></li>
        <li class="nav-item"><a class="nav-link" href="/companies"><i class="bi bi-building me-1"></i>Companies</a></li>
      </ul>
      <ul class="navbar-nav ms-auto">
        {% if user %}
          <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
          {% if user.role == "seeker" %}
          <li class="nav-item"><a class="nav-link" href="/my-applications"><i class="bi bi-file-earmark-text me-1"></i>My Applications</a></li>
          {% endif %}
          <li class="nav-item"><a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right me-1"></i>Logout</a></li>
        {% else %}
          <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
          <li class="nav-item"><a class="nav-link btn btn-light text-primary px-3 ms-2 fw-semibold" href="/register">Register</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer class="text-center text-muted py-4 mt-5 border-top bg-white">
  <small>&copy; 2024 JobBoard — Find your dream job.</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
