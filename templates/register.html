{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h3 class="fw-bold mb-1">Create Account</h3>
          <p class="text-muted mb-4">Join JobBoard today — it's free!</p>
          {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
          <form method="post" action="/register">
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">I am a...</label>
              <select name="role" class="form-select">
                <option value="seeker">Job Seeker</option>
                <option value="recruiter">Recruiter</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-semibold">Register</button>
          </form>
          <hr>
          <p class="text-center mb-0">Already have an account? <a href="/login">Login</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
